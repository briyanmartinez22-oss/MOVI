name: Production Deploy

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  NODE_VERSION: '22'

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: movi
          POSTGRES_PASSWORD: movi
          POSTGRES_DB: movi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U movi -d movi"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci

      - name: Prisma validate
        working-directory: backend
        env:
          DATABASE_URL: postgresql://movi:movi@localhost:5432/movi?schema=public
        run: npm run prisma:validate

      - name: Apply migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://movi:movi@localhost:5432/movi?schema=public
        run: npm run db:migrate:deploy

      - name: Backend build
        working-directory: backend
        env:
          DATABASE_URL: postgresql://movi:movi@localhost:5432/movi?schema=public
        run: npm run build

      - name: Frontend typecheck
        run: npm run typecheck

      - name: Seed super admin
        working-directory: backend
        env:
          DATABASE_URL: postgresql://movi:movi@localhost:5432/movi?schema=public
        run: npm run db:seed-super-admin

      - name: Start backend for QA
        working-directory: backend
        env:
          DATABASE_URL: postgresql://movi:movi@localhost:5432/movi?schema=public
          PORT: '3001'
          JWT_SECRET: ci-production-secret
          DEMO_OTP_ENABLED: 'true'
          DEMO_OTP_CODE: '123456'
          CORS_ORIGIN: '*'
        run: |
          node dist/main.js &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/health && break
            sleep 2
          done

      - name: CI QA gate (100% required)
        working-directory: backend
        env:
          API_URL: http://localhost:3001
          DEMO_OTP_ENABLED: 'true'
          DEMO_OTP_CODE: '123456'
          DATABASE_URL: postgresql://movi:movi@localhost:5432/movi?schema=public
        run: npm run test

  deploy-production:
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Capture current deployment id (rollback target)
        id: rollback
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_PRODUCTION_BACKEND_SERVICE_ID }}
        run: |
          test -n "$RAILWAY_SERVICE_ID"
          PREVIOUS=$(railway deployment list --service "$RAILWAY_SERVICE_ID" --json | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{const j=JSON.parse(d);console.log(j[0]?.id||'')}catch{console.log('')}})")
          echo "previous=$PREVIOUS" >> "$GITHUB_OUTPUT"

      - name: Deploy backend to Railway PRODUCTION
        id: deploy
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_PRODUCTION_BACKEND_SERVICE_ID }}
        run: |
          test -n "$RAILWAY_SERVICE_ID"
          railway up --detach --service "$RAILWAY_SERVICE_ID"

      - name: Post-deploy smoke (production)
        id: smoke
        env:
          PRODUCTION_API_URL: ${{ secrets.PRODUCTION_API_URL }}
        run: |
          test -n "$PRODUCTION_API_URL"
          for i in $(seq 1 36); do
            curl -sf "$PRODUCTION_API_URL/health" && exit 0
            sleep 5
          done
          echo "Production health check failed"
          exit 1

      - name: Rollback on smoke failure
        if: failure() && steps.rollback.outputs.previous != ''
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_PRODUCTION_BACKEND_SERVICE_ID }}
        run: |
          test -n "$RAILWAY_SERVICE_ID"
          echo "Rolling back to deployment ${{ steps.rollback.outputs.previous }}"
          railway redeploy --service "$RAILWAY_SERVICE_ID" --deployment "${{ steps.rollback.outputs.previous }}"
