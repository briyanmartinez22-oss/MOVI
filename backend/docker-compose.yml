services:
  postgres:
    image: postgres:16-alpine
    container_name: movi-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: movi
      POSTGRES_PASSWORD: movi
      POSTGRES_DB: movi
    volumes:
      - movi_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U movi -d movi']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  movi_pg_data:
